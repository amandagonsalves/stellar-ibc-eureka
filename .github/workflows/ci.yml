name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  npm_config_audit: false
  npm_config_fund: false
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-crates-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-crates-

      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-latest-2

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        run: >
          cargo audit --file Cargo.lock
          --ignore RUSTSEC-2026-0104
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2026-0009

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint
        run: >
          cargo clippy --locked --all-targets --
          -D warnings
          -A clippy::manual_is_multiple_of
          -A clippy::too_many_arguments

      - name: Check install build warnings
        run: >
          cargo rustc --locked --release
          --bin stellar-gateway --
          -D warnings

      - name: Test
        run: cargo test --locked

  gateway-health:
    name: Gateway health
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.91.1

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gateway-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gateway-

      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: Install grpcurl
        run: |
          GRPCURL_VERSION=1.9.1
          curl -sSL \
            "https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin grpcurl

      - name: Run gateway health checks
        run: bash ci/gateway-health.sh
