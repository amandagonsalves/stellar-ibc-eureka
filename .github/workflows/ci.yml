name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  npm_config_audit: false
  npm_config_fund: false
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-audit
            target
          key: ${{ runner.os }}-cargo-crates-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-crates-

      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: >
          cargo audit --file Cargo.lock
          --ignore RUSTSEC-2026-0104
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2026-0009

      - name: Check formatting
        run: cargo fmt --manifest-path Cargo.toml -- --check

      - name: Lint
        run: >
          cargo clippy --manifest-path Cargo.toml --locked --all-targets --
          -D warnings
          -A clippy::manual_is_multiple_of
          -A clippy::too_many_arguments

      - name: Check install build warnings
        run: >
          cargo rustc --manifest-path Cargo.toml --locked --release
          --bin crates --
          -D warnings

      - name: Test
        run: cargo test --manifest-path Cargo.toml --locked
