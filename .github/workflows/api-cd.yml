name: api cd

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build & push by digest (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    environment: staging
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: prepare platform pair
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/api/Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=api-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=api-${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ vars.API_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-api-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge manifest & push tags
    runs-on: ubuntu-latest
    environment: staging
    needs: build
    timeout-minutes: 15

    steps:
      - name: download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-api-*
          merge-multiple: true

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: create manifest list & push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ${{ vars.API_IMAGE }}:latest \
            -t ${{ vars.API_IMAGE }}:${{ github.sha }} \
            $(printf '${{ vars.API_IMAGE }}@sha256:%s ' *)

      - name: inspect
        run: docker buildx imagetools inspect ${{ vars.API_IMAGE }}:latest
