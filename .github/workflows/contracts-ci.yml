name: contracts ci

on:
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  soroban:
    uses: ./.github/workflows/ci.yml
    with:
      working-directory: contracts/soroban
      targets: wasm32v1-none
      build: cargo build --locked --profile contract --target wasm32v1-none --workspace --exclude soroban-contracts-tests

  cosmwasm-light-client:
    uses: ./.github/workflows/ci.yml
    with:
      package: light-client-wasm
      targets: wasm32-unknown-unknown
      build: cargo build --locked --target wasm32-unknown-unknown -p light-client-wasm --release && sha256sum target/wasm32-unknown-unknown/release/light_client_wasm.wasm
