name: API CI

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/api/**"
      - "crates/core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/api-ci.yml"
  push:
    branches: [main]
    paths:
      - "crates/api/**"
      - "crates/core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/api-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & smoke-test api image
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/api/Dockerfile
          tags: stellar-ibc-api:ci
          load: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Run api
        env:
          STELLAR_SIGNING_KEY: ${{ secrets.STELLAR_SIGNING_KEY }}
        run: |
          docker run -d --name api -p 8101:8101 \
            -e STELLAR_API_HOST=0.0.0.0 \
            -e STELLAR_API_PORT=8101 \
            -e STELLAR_RPC_URL=https://soroban-testnet.stellar.org \
            -e NETWORK_PASSPHRASE='Test SDF Network ; September 2015' \
            -e STELLAR_SIGNING_KEY="$STELLAR_SIGNING_KEY" \
            stellar-ibc-api:ci

      - name: Make an HTTP request (/health)
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8101/health >/dev/null 2>&1; then
              echo "api is healthy:"
              curl -fsS http://localhost:8101/health
              exit 0
            fi
            echo "waiting for api to come up ($i/30)..."
            sleep 2
          done
          echo "api did not become healthy in time" >&2
          exit 1

      - name: Container logs
        if: always()
        run: docker logs api || true

      - name: Cleanup
        if: always()
        run: docker rm -f api || true
