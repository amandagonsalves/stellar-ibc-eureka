name: interstellar

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: interstellar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: setup environment
    runs-on: ubuntu-24.04-arm
    environment: staging
    timeout-minutes: 45
    env:
      STELLAR_SIGNING_KEY: ${{ secrets.STELLAR_SIGNING_KEY }}
      COSMOS_VALIDATOR_MNEMONIC: ${{ secrets.COSMOS_VALIDATOR_MNEMONIC }}
      COSMOS_RELAYER_MNEMONIC: ${{ secrets.COSMOS_RELAYER_MNEMONIC }}
      COSMOS_PROPOSER_PRIVATE_KEY: ${{ secrets.COSMOS_PROPOSER_PRIVATE_KEY }}
      COSMOS_FUNDER_PRIVATE_KEY: ${{ secrets.COSMOS_FUNDER_PRIVATE_KEY }}

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup rust
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32v1-none, wasm32-unknown-unknown

      - name: cache cargo
        uses: Swatinem/rust-cache@v2

      - name: install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: install stellar cli
        uses: stellar/stellar-cli@v27.0.0

      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: load repo variables into env
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: echo "$VARS_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"
  
  start:
    needs: setup
    name: start interstellar
    run: make install

  test-ics02-clients:
    needs: start
    run: interstellar test --type ics02-clients

  test-ics02-counterparty:
    needs: start
    run: interstellar test --type ics02-counterparty

  test-ics02-query:
    needs: start
    run: interstellar test --type ics02-query

  test-ics20-transfer:
    needs: start
    run: interstellar test --type ics20-transfer
    
  logs:
    needs: [test-ics02-clients, test-ics02-counterparty, test-ics02-query, test-ics20-transfer]
    run: interstellar logs --since 900s

  down:
    needs: [test-ics02-clients, test-ics02-counterparty, test-ics02-query, test-ics20-transfer]
    run: interstellar down --volumes