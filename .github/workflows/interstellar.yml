name: interstellar

on:
  pull_request:
    paths:
      - 'interstellar/**'
      - 'docker-compose.yml'
      - 'hermes-config.toml'
      - '.github/workflows/interstellar.yml'
      - '.github/actions/setup-interstellar/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: interstellar-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: interstellar ics flows
    runs-on: ubuntu-24.04-arm
    environment: staging
    timeout-minutes: 60
    env:
      STELLAR_SIGNING_KEY: ${{ secrets.STELLAR_SIGNING_KEY }}
      COSMOS_VALIDATOR_MNEMONIC: ${{ secrets.COSMOS_VALIDATOR_MNEMONIC }}
      COSMOS_RELAYER_MNEMONIC: ${{ secrets.COSMOS_RELAYER_MNEMONIC }}
      COSMOS_VALIDATOR_PRIVATE_KEY: ${{ secrets.COSMOS_VALIDATOR_PRIVATE_KEY }}
      COSMOS_RELAYER_PRIVATE_KEY: ${{ secrets.COSMOS_RELAYER_PRIVATE_KEY }}

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup
        uses: ./.github/actions/setup-interstellar

      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: load repo variables into env
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: echo "$VARS_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: bring up the stack
        run: cargo run --locked -p interstellar -- start

      - name: ics02-clients
        run: cargo run --locked -p interstellar -- test --ics ics02-clients

      - name: ics02-counterparty
        run: cargo run --locked -p interstellar -- test --ics ics02-counterparty

      - name: ics20-transfer
        run: cargo run --locked -p interstellar -- test --ics ics20-transfer

      - name: ics02-query
        run: cargo run --locked -p interstellar -- test --ics ics02-query

      - name: stack logs on failure
        if: failure()
        run: |
          docker compose --profile local --profile hermes ps -a || true
          docker compose --profile local --profile hermes logs --no-color --tail 400 || true

      - name: tear down
        if: always()
        run: cargo run --locked -p interstellar -- down --volumes || true
