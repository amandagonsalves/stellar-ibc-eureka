name: interstellar

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: interstellar-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.ics }}
    runs-on: ubuntu-24.04-arm
    environment: staging
    timeout-minutes: 30
    strategy:
      # Each ICS flow is its own job so a failed one can be re-run on its own.
      # Sequential (max-parallel 1): the legs share one Stellar testnet account,
      # so concurrent client-creation txs would collide on the account sequence.
      fail-fast: false
      max-parallel: 1
      matrix:
        ics:
          - ics02-clients
          - ics02-counterparty
          - ics20-transfer
          - ics02-query
    env:
      STELLAR_SIGNING_KEY: ${{ secrets.STELLAR_SIGNING_KEY }}
      COSMOS_VALIDATOR_MNEMONIC: ${{ secrets.COSMOS_VALIDATOR_MNEMONIC }}
      COSMOS_RELAYER_MNEMONIC: ${{ secrets.COSMOS_RELAYER_MNEMONIC }}
      COSMOS_VALIDATOR_PRIVATE_KEY: ${{ secrets.COSMOS_VALIDATOR_PRIVATE_KEY }}
      COSMOS_RELAYER_PRIVATE_KEY: ${{ secrets.COSMOS_RELAYER_PRIVATE_KEY }}

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup
        uses: ./.github/actions/setup-interstellar

      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: load repo variables into env
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: echo "$VARS_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: bring up the stack
        run: cargo run --locked -p interstellar -- start

      - name: bootstrap ibc clients + counterparties
        run: |
          cargo run --locked -p interstellar -- tx clients create
          cargo run --locked -p interstellar -- tx clients counterparty

      - name: test ${{ matrix.ics }}
        run: cargo run --locked -p interstellar -- test --ics ${{ matrix.ics }}

      - name: stack logs on failure
        if: failure()
        run: |
          docker compose --profile local --profile hermes ps -a || true
          docker compose --profile local --profile hermes logs --no-color --tail 400 || true

      - name: tear down
        if: always()
        run: cargo run --locked -p interstellar -- down --volumes || true
