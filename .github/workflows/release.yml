name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to build the release for (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  wasm:
    name: build wasm artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: setup rust
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32v1-none, wasm32-unknown-unknown

      - name: cache cargo
        uses: Swatinem/rust-cache@v2

      - name: build soroban contracts
        working-directory: contracts/soroban
        run: cargo build --locked --profile contract --target wasm32v1-none

      - name: build cosmwasm 08-wasm light client
        run: cargo build --locked --target wasm32-unknown-unknown -p light-client-wasm --release

      - name: collect artifacts + checksums
        run: |
          mkdir -p dist
          cp contracts/soroban/target/wasm32v1-none/contract/*.wasm dist/
          cp target/wasm32-unknown-unknown/release/light_client_wasm.wasm dist/
          ( cd dist && sha256sum *.wasm | tee checksums.txt )

      - name: upload wasm dist
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: dist/*
          if-no-files-found: error

  images-api:
    name: versioned api image
    uses: ./.github/workflows/api-cd.yml
    with:
      version: ${{ github.event.inputs.tag || github.ref_name }}
    secrets: inherit

  images-gateway:
    name: versioned gateway image
    uses: ./.github/workflows/gateway-cd.yml
    with:
      version: ${{ github.event.inputs.tag || github.ref_name }}
    secrets: inherit

  release:
    name: github release
    runs-on: ubuntu-latest
    needs: [wasm]
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: download wasm dist
        uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*
