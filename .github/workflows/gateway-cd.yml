name: Gateway CD

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gateway-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & push gateway image
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/gateway/Dockerfile
          push: true
          tags: |
            ${{ vars.GATEWAY_IMAGE }}:latest
            ${{ vars.GATEWAY_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway
