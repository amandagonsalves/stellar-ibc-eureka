name: setup-interstellar
description: Rust toolchain + protoc + binaryen (wasm-opt) + stellar CLI for the interstellar stack

runs:
  using: composite
  steps:
    - name: setup rust
      uses: dtolnay/rust-toolchain@1.91.1
      with:
        targets: wasm32v1-none, wasm32-unknown-unknown

    - name: cache cargo
      uses: Swatinem/rust-cache@v2

    - name: install protoc
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y protobuf-compiler

    - name: install binaryen (wasm-opt)
      shell: bash
      run: |
        ver=version_129
        curl -sSfL "https://github.com/WebAssembly/binaryen/releases/download/${ver}/binaryen-${ver}-aarch64-linux.tar.gz" -o /tmp/binaryen.tar.gz
        sudo tar -xzf /tmp/binaryen.tar.gz -C /opt
        echo "/opt/binaryen-${ver}/bin" >> "$GITHUB_PATH"
        /opt/binaryen-${ver}/bin/wasm-opt --version
        /opt/binaryen-${ver}/bin/wasm-opt --help 2>&1 | grep -q llvm-memory-copy-fill-lowering \
          || { echo "ERROR: binaryen ${ver} lacks --llvm-memory-copy-fill-lowering"; exit 1; }

    - name: install stellar cli
      uses: stellar/stellar-cli@v27.0.0
      with:
        version: '27.0.0'
