services:
  node:
    profiles: [local-stellar]
    image: stellar/quickstart:latest
    platform: linux/amd64
    command: --local --enable-soroban-rpc
    ports:
      - "8000:8000"
      - "11625:11625"
      - "11626:11626"
    environment:
      ENABLE_LOGS: "false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  cosmos:
    profiles: [local, cosmos]
    image: ${COSMOS_CHAIN_IMAGE:-ghcr.io/cosmos/ibc-go-wasm-simd:v11.0.0}
    user: "0:0"
    entrypoint: ["sh", "/setup.sh"]
    volumes:
      - ./interstellar/src/services/cosmos/assets/setup.sh:/setup.sh:ro
      - ./interstellar/src/services/cosmos/assets/default-config.json:/config/default-config.json:ro
      - cosmos-home:/root/.simapp
    environment:
      COSMOS_CHAIN_ID: "${COSMOS_CHAIN_ID:-simd-1}"
      COSMOS_VALIDATOR_MNEMONIC: "${COSMOS_VALIDATOR_MNEMONIC}"
      COSMOS_RELAYER_MNEMONIC: "${COSMOS_RELAYER_MNEMONIC}"
    ports:
      - "26657:26657"
      - "1317:1317"
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "simd status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  gateway:
    build:
      context: .
      dockerfile: crates/gateway/Dockerfile
    image: ${GATEWAY_IMAGE}:${GATEWAY_TAG}
    profiles: [local, staging]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
        required: false
    ports:
      - "${STELLAR_GATEWAY_GRPC_PORT}:${STELLAR_GATEWAY_GRPC_PORT}"
    environment:
      STELLAR_GATEWAY_HOST: "0.0.0.0"
      STELLAR_GATEWAY_GRPC_PORT: "${STELLAR_GATEWAY_GRPC_PORT}"
      STELLAR_API_URL: "http://api:${STELLAR_API_PORT}"
      ROUTER_CONTRACT_ADDRESS: "${ROUTER_CONTRACT_ADDRESS}"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${STELLAR_GATEWAY_GRPC_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: crates/api/Dockerfile
    image: ${API_IMAGE}:${API_TAG}
    entrypoint: ["stellar-api"]
    profiles: [local, staging]
    restart: unless-stopped
    depends_on:
      node:
        condition: service_started
        required: false
      cosmos:
        condition: service_healthy
        required: false
    ports:
      - "${STELLAR_API_PORT}:${STELLAR_API_PORT}"
    environment:
      STELLAR_API_HOST: "0.0.0.0"
      STELLAR_API_PORT: "${STELLAR_API_PORT}"
      STELLAR_RPC_URL: "${STELLAR_RPC_URL}"
      NETWORK_PASSPHRASE: "${NETWORK_PASSPHRASE}"
      ROUTER_CONTRACT_ADDRESS: "${ROUTER_CONTRACT_ADDRESS}"
      TRANSFER_CONTRACT_ADDRESS: "${TRANSFER_CONTRACT_ADDRESS}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${STELLAR_API_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  hermes:
    profiles: [hermes, staging]
    image: ${HERMES_IMAGE}:${HERMES_TAG}
    restart: on-failure
    user: "0:0"
    depends_on:
      gateway:
        condition: service_healthy
        required: false
    command: ["--config", "/home/hermes/.hermes/config.toml", "start"]
    volumes:
      - ./hermes-config.toml:/home/hermes/.hermes/config.toml:ro
      - hermes-keys:/home/hermes/.hermes/keys
    environment:
      RUST_LOG: "${HERMES_LOG_LEVEL:-info}"
      HOME: "/home/hermes"
    healthcheck:
      test: ["CMD", "hermes", "--config", "/home/hermes/.hermes/config.toml", "health-check"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  hermes-keys:
  cosmos-home:
