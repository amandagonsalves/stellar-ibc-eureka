services:
  stellar-node:
    profiles: [local]
    image: stellar/quickstart:latest
    platform: linux/amd64
    command: --local --enable-soroban-rpc
    ports:
      - "8000:8000"
      - "11625:11625"
      - "11626:11626"
    environment:
      ENABLE_LOGS: "false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  stellar-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: amandagonsalvesdev/stellar-ibc-gateway:latest
    profiles: [local, staging]
    restart: unless-stopped
    depends_on:
      stellar-node:
        condition: service_healthy
        required: false
    ports:
      - "${STELLAR_GATEWAY_GRPC_PORT:-50052}:50052"
      - "${STELLAR_GATEWAY_HTTP_PORT:-8005}:8005"
    environment:
      STELLAR_GATEWAY_HOST: "0.0.0.0"
      STELLAR_GATEWAY_GRPC_PORT: "50052"
      STELLAR_GATEWAY_HTTP_PORT: "8005"
      STELLAR_RPC_URL: "${STELLAR_RPC_URL:-https://soroban-testnet.stellar.org}"
      NETWORK_PASSPHRASE: "${NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}"
      STELLAR_SIGNING_KEY: "${STELLAR_SIGNING_KEY}"
      IBC_CONTRACT_ID: "${IBC_CONTRACT_ID:-}"
      TRANSFER_CONTRACT_ID: "${TRANSFER_CONTRACT_ID:-}"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 50052 && nc -z localhost 8005"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  hermes:
    profiles: [hermes, staging]
    image: amandagonsalvesdev/stellar-hermes-cardano:latest
    restart: unless-stopped
    depends_on:
      stellar-gateway:
        condition: service_healthy
        required: false
    volumes:
      - ./ci/hermes-config.toml:/root/.hermes/config.toml:ro
    environment:
      RUST_LOG: "${HERMES_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "hermes", "health-check"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
