services:
  node:
    profiles: [local-stellar]
    image: stellar/quickstart:latest
    platform: linux/amd64
    command: --local --enable-soroban-rpc
    ports:
      - "8000:8000"
      - "11625:11625"
      - "11626:11626"
    environment:
      ENABLE_LOGS: "false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  osmosis:
    profiles: [osmosis, local]
    image: osmolabs/osmosis:${OSMOSIS_VERSION:-31.0.3}-alpine
    platform: linux/amd64
    entrypoint: ["sh", "/setup.sh"]
    volumes:
      - ./crates/osmosis/assets/setup.sh:/setup.sh:ro
      - ./crates/osmosis/assets/default-config.json:/config/default-config.json:ro
      - ${HOME}/.osmosisd-local:/osmosis/.osmosisd
    environment:
      COSMOS_CHAIN_ID: "${COSMOS_CHAIN_ID:-localosmosis}"
    ports:
      - "26658:26657"
      - "1318:1317"
      - "9094:9090"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:26657/status | grep -q '\"latest_block_height\":\"[1-9]'"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${GATEWAY_IMAGE}:${GATEWAY_TAG}
    profiles: [local, staging]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
        required: false
    ports:
      - "${STELLAR_GATEWAY_GRPC_PORT}:${STELLAR_GATEWAY_GRPC_PORT}"
    environment:
      STELLAR_GATEWAY_HOST: "0.0.0.0"
      STELLAR_GATEWAY_GRPC_PORT: "${STELLAR_GATEWAY_GRPC_PORT}"
      STELLAR_API_URL: "http://api:${STELLAR_API_PORT}"
      ROUTER_CONTRACT_ADDRESS: "${ROUTER_CONTRACT_ADDRESS}"
      STELLAR_SIGNING_KEY: "${STELLAR_SIGNING_KEY}"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${STELLAR_GATEWAY_GRPC_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${API_IMAGE}:${API_TAG}
    entrypoint: ["stellar-api"]
    profiles: [local, staging]
    restart: unless-stopped
    depends_on:
      node:
        condition: service_started
        required: false
      osmosis:
        condition: service_healthy
        required: false
    ports:
      - "${STELLAR_API_PORT}:${STELLAR_API_PORT}"
    volumes:
      - ./hermes-config.toml:/etc/hermes/config.toml:rw
    environment:
      STELLAR_API_HOST: "0.0.0.0"
      STELLAR_API_PORT: "${STELLAR_API_PORT}"
      STELLAR_RPC_URL: "${STELLAR_RPC_URL}"
      NETWORK_PASSPHRASE: "${NETWORK_PASSPHRASE}"
      STELLAR_SIGNING_KEY: "${STELLAR_SIGNING_KEY}"
      ROUTER_CONTRACT_ADDRESS: "${ROUTER_CONTRACT_ADDRESS}"
      TRANSFER_CONTRACT_ADDRESS: "${TRANSFER_CONTRACT_ADDRESS}"
      COSMOS_CHAIN_ID: "${COSMOS_CHAIN_ID}"
      COSMOS_REST_URL: "http://osmosis:1317"
      COSMOS_RPC_URL: "http://osmosis:26657"
      COSMOS_ACCOUNT_PREFIX: "${COSMOS_ACCOUNT_PREFIX}"
      COSMOS_GAS_DENOM: "${COSMOS_GAS_DENOM}"
      COSMOS_PROPOSER_PRIVATE_KEY: "${COSMOS_PROPOSER_PRIVATE_KEY}"
      COSMOS_FUNDER_PRIVATE_KEY: "${COSMOS_FUNDER_PRIVATE_KEY}"
      HERMES_CONFIG_PATH: "/etc/hermes/config.toml"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${STELLAR_API_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  hermes:
    profiles: [hermes, staging]
    image: ${HERMES_IMAGE}:${HERMES_TAG}
    restart: on-failure
    user: "0:0"
    depends_on:
      gateway:
        condition: service_healthy
        required: false
    command: ["--config", "/home/hermes/.hermes/config.toml", "start"]
    volumes:
      - ./hermes-config.toml:/home/hermes/.hermes/config.toml:ro
      - hermes-keys:/home/hermes/.hermes/keys
    environment:
      RUST_LOG: "${HERMES_LOG_LEVEL:-info}"
      HOME: "/home/hermes"
    healthcheck:
      test: ["CMD", "hermes", "--config", "/home/hermes/.hermes/config.toml", "health-check"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  hermes-keys:
