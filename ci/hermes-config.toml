[global]
log_level = 'debug'

[mode.clients]
enabled = true
refresh = true
misbehaviour = true

[mode.connections]
enabled = false

[mode.channels]
enabled = false

[mode.packets]
enabled = false

# Cosmos cardano-entrypoint chain (ibc-go v10, 08-wasm enabled)
[[chains]]
id = 'cardanoentrypoint'
type = 'CosmosSdk'
rpc_addr = 'http://127.0.0.1:26657'
grpc_addr = 'http://127.0.0.1:9090'
event_source = { mode = 'push', url = 'ws://127.0.0.1:26657/websocket', batch_delay = '500ms' }
rpc_timeout = '10s'
trusted_node = false
account_prefix = 'cosmos'
key_name = 'testkey'
store_prefix = 'ibc'
default_gas = 100000
max_gas = 4000000
gas_price = { price = 0.001, denom = 'stake' }
gas_multiplier = 1.5
max_msg_num = 30
max_tx_size = 2097152
clock_drift = '5s'
trusting_period = '3m'
trust_threshold = '2/3'
address_type = { derivation = 'cosmos' }

[[chains]]
id = 'stellar-testnet'
type = 'Stellar'
event_poll_interval = 2
event_replay_window = 256
gateway_url = 'http://127.0.0.1:50052'
network_passphrase = 'Test SDF Network ; September 2015'
ibc_contract_id = ''
key_name = 'stellar-relayer'
stub_key_name = 'stellar-relayer'
max_block_time = '6s'
trust_threshold = '2/3'
clear_interval = 0
query_packets_chunk_size = 50
clock_drift = '5s'
client_refresh_rate = '1/3'
wasm_checksum_hex = ''

[chains.packet_filter]
policy = 'allow'
list = []
