[global]
log_level = 'debug'

[telemetry]
enabled = true
host = '127.0.0.1'
port = 3002

[telemetry.buckets.latency_submitted]
start = 500
end = 20000
buckets = 10

[telemetry.buckets.latency_confirmed]
start = 1000
end = 30000
buckets = 10

[rest]
enabled = false
host = '127.0.0.1'
port = 3030

[mode]

[mode.clients]
enabled = true
refresh = true
misbehaviour = true

[mode.connections]
enabled = true

[mode.channels]
enabled = true

[mode.packets]
enabled = true
clear_interval = 100
clear_on_start = true
tx_confirmation = true

[[chains]]
id = 'localosmosis'
type = 'CosmosSdk'
rpc_addr = 'http://osmosis:26657'
grpc_addr = 'http://osmosis:9090'
event_source = { mode = 'push', url = 'ws://osmosis:26657/websocket', batch_delay = '200ms' }
rpc_timeout = '10s'
account_prefix = 'osmo'
key_name = 'localosmosis'
address_type = { derivation = 'cosmos' }
store_prefix = 'ibc'
default_gas = 5000000
max_gas = 15000000
gas_price = { price = 0.1, denom = 'uosmo' }
gas_multiplier = 2.0
max_msg_num = 20
max_tx_size = 209715
clock_drift = '20s'
max_block_time = '10s'
trusting_period = '10days'
memo_prefix = 'Osmosis Docs Rocks'
trust_threshold = { numerator = '1', denominator = '3' }

[[chains]]
id = 'stellar-testnet'
type = 'Stellar'
event_poll_interval = 20
event_replay_window = 256
gateway_url = 'http://gateway:50052'
network_passphrase = 'Test SDF Network ; September 2015'
ibc_contract_id = ''
key_name = 'stellar-relayer'
stub_key_name = 'stellar-relayer'
max_block_time = '6s'
trust_threshold = '2/3'
clear_interval = 0
query_packets_chunk_size = 50
clock_drift = '5s'
client_refresh_rate = '1/3'
wasm_checksum_hex = '4cd5b28e3d532d50aee8b842d1003c37c6a1844931fd789a3607f93b8d594dfc'

